<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | BurnoutGuard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <span>🧠</span>
                <h1>BurnoutGuard</h1>
            </div>
            <h2 class="auth-title">Create your account</h2>
            <p class="auth-subtitle">Start tracking your wellness today</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
            {% endfor %}
            {% endwith %}

            <form method="POST" action="{{ url_for('main.register') }}" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="you@university.edu" required>
                </div>
                <div class="form-group">
                    <label for="password">Password <span class="range-label">(min. 6 characters)</span></label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••"
                        required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Create Account</button>
            </form>

            <p class="auth-switch">Already have an account? <a href="{{ url_for('main.login') }}">Sign in</a></p>
        </div>
    </div>
</body>

</html>
