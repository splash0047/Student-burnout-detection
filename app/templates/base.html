<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Student Burnout Detection System — Detect early signs of burnout using behavioural data and AI.">
    <title>{% block title %}Burnout Detection{% endblock %} | Student Wellness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- Mobile Top Nav -->
    <header class="mobile-header" id="mobileHeader">
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
        <span class="mobile-logo">🧠 BurnoutGuard</span>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">🧠</span>
            <span class="logo-text">BurnoutGuard</span>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('main.dashboard') }}" class="{% if request.endpoint == 'main.dashboard' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                Dashboard
            </a></li>
            <li><a href="{{ url_for('main.history') }}" class="{% if request.endpoint == 'main.history' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
                History
            </a></li>
            <li><a href="{{ url_for('main.log_session') }}" class="{% if request.endpoint == 'main.log_session' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Log Session
            </a></li>
            <li><a href="{{ url_for('main.onboarding') }}" class="{% if request.endpoint == 'main.onboarding' %}active{% endif %}">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                Onboarding
            </a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="student-badge" id="studentBadge">
                <div class="avatar">S</div>
                <div class="student-info">
                    <span class="student-name" id="studentName">{{ student.name if student else 'Student' }}</span>
                    <span class="student-id" id="studentIdDisplay">{{ student.id[:8] if student else '—' }}…</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Expose student ID globally
        window.STUDENT_ID = "{{ student.id if student else '' }}";
    </script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
